<h2 style="text-align: center; margin-bottom: 24px; color: #1f2937; font-size: 1.5rem;">
    Şifre Değiştirme
</h2>

<div class="change-password-page-container">
    <form [formGroup]="changePasswordForm" (ngSubmit)="changePassword()">

        <div class="form-group">
            <label for="previousPassword">Eski Şifre : </label>
            <input 
                id="previousPassword" 
                formControlName="previousPassword" 
                type="password" 
            >
        </div>

        <div class="form-group">
            <label for="newPassword">Yeni Şifre : </label>
            <input 
                id="newPassword" 
                formControlName="newPassword" 
                type="password" 
            >
        </div>

        <button id="changePasswordButton" type="submit" [disabled]="changePasswordForm.invalid">Kaydet</button>
    </form>
</div>
