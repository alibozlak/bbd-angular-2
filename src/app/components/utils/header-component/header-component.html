<mat-toolbar color="primary" class="mat-elevation-z4">
    <!-- Left Side: Application Title -->
    <span>SKT Takip Sistemi</span>

    <!-- Center: Flexible spacer to push the menu to the right -->
    <span class="toolbar-spacer"></span>

    <!-- Right Side: Trigger Button -->
    <button mat-icon-button [matMenuTriggerFor]="userMenu" aria-label="User Menu">
        <mat-icon>account_circle</mat-icon>
    </button>

    <!-- Hidden Dropdown Menu (Invisible until clicked) -->
    <mat-menu #userMenu="matMenu" xPosition="before">

        @if (isUserABbdTracker) {               
            <button mat-menu-item (click)="goAddProductPage()">
                <mat-icon color="warn">add_box</mat-icon>
                <span>Ürün Ekle</span>
            </button>

            <mat-divider></mat-divider>

            <button mat-menu-item (click)="goAddUserForBbdTrackerPage()">
                <mat-icon color="warn">person_add</mat-icon>
                <span>Personel Ekle</span>
            </button>

            <mat-divider></mat-divider>

            <button mat-menu-item (click)="goUserListForBbdTracker()">
                <mat-icon color="warn">group</mat-icon>
                <span>Mağaza Elemanları</span>
            </button>

            <mat-divider></mat-divider>
        }

        <button mat-menu-item (click)="goChangePasswordPage()">
            <mat-icon>vpn_key</mat-icon>
            <span>Şifre Değiştir</span>
        </button>
        
        <mat-divider></mat-divider>
        
        <button mat-menu-item (click)="logout()">
            <mat-icon color="warn">exit_to_app</mat-icon>
            <span class="danger-text">Çıkış Yap</span>
        </button>
    </mat-menu>
</mat-toolbar>
